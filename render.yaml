services:
  # ── Backend (Express + Node) ──────────────────────────────────────────────
  - type: web
    name: buyer-dashboard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false          # wpisz ręcznie w Render dashboard
      - key: OPENAI_PRIMARY_MODEL
        value: gpt-4.1
      - key: OPENAI_CHEAP_MODEL
        value: gpt-4.1-mini
      - key: DATABASE_URL
        sync: false          # wpisz ręcznie w Render dashboard
      - key: FRED_API_KEY
        sync: false          # wpisz ręcznie w Render dashboard
      - key: FRONTEND_URL
        sync: false          # wpisz URL frontendu po jego deployu

  # ── Frontend (Vite → static) ──────────────────────────────────────────────
  - type: web
    name: buyer-dashboard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://buyer-dashboard-backend.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html
